# Guardrail Allowlist
#
# Managed exceptions for architecture guardrail checks. Each entry documents
# why the exception exists and when it should be removed.
#
# Format:
#   - file: <relative path from repo root>
#     rule: <guardrail rule name>
#     owner: <team or person responsible>
#     reason: <why this exception is acceptable>
#     removal_phase: <when this entry should be deleted>

allowlist:
  - file: src/core/core_process.cpp
    rule: platform_ifdef_in_core
    owner: core-team
    reason: "Transitional core process entrypoint still owns platform-specific stdio and daemonization setup while lifecycle and runtime seams are being extracted."
    removal_phase: "Phase 9 -- move platform process bootstrap into src/platform/common or per-platform adapters"

  - file: src/core/pipe_ipc.cpp
    rule: platform_ifdef_in_core
    owner: core-team
    reason: "Core IPC transport still contains the named-pipe versus Unix-domain-socket split behind one public PipeIpc facade."
    removal_phase: "Phase 9 -- split PipeIpcListener and PipeIpcClient implementations into platform adapters"

  - file: src/core/app_api/desktop_tunnel_host.cpp
    rule: platform_ifdef_in_core
    owner: core-team
    reason: "Legacy desktop tunnel host keeps a Windows-only direct fallback guard until desktop traffic is fully routed through the core IPC contract."
    removal_phase: "Phase 9 -- retire legacy desktop tunnel host path"

  - file: src/core/connection/connection_attempt.cpp
    rule: platform_ifdef_in_core
    owner: core-team
    reason: "Connection attempt orchestration still branches for platform helper/runtime behavior during the CLI-core-UI contract transition."
    removal_phase: "Phase 9 -- extract platform connection attempt policies"

  - file: src/core/tunnel_controller/tunnel_controller_connect.cpp
    rule: platform_ifdef_in_core
    owner: core-team
    reason: "Tunnel controller connect path still has Windows-specific native network behavior that is not yet isolated behind platform network ops."
    removal_phase: "Phase 9 -- move remaining platform connect decisions into platform network ops"

  - file: src/core/use_cases/system_status_use_cases.cpp
    rule: platform_ifdef_in_core
    owner: core-team
    reason: "System status use case still conditionally reports Windows-only driver/runtime metadata."
    removal_phase: "Phase 9 -- move OS-specific status enrichment into platform status providers"

  - file: src/platform/win32/native_tls_stream.hpp
    rule: protocol_include_in_platform
    owner: platform-team
    reason: "Win32 NativeTlsStream implements the TlsStream interface defined in vpn_engine/protocol. The class inherits from TlsStream and must include its definition."
    removal_phase: "Phase 8 -- when platform TLS is abstracted behind a platform-neutral interface"

  - file: src/platform/darwin/native_tls_stream.hpp
    rule: protocol_include_in_platform
    owner: platform-team
    reason: "Darwin NativeTlsStream implements the TlsStream interface defined in vpn_engine/protocol. The class inherits from TlsStream and must include its definition."
    removal_phase: "Phase 8 -- when platform TLS is abstracted behind a platform-neutral interface"

  - file: src/platform/win32/default_engine_deps.cpp
    rule: protocol_include_in_platform
    owner: platform-team
    reason: "Default Win32 engine dependency wiring constructs ProductionTransport with platform packet and TLS implementations."
    removal_phase: "Phase 9 -- introduce a platform-neutral production transport factory seam"

  - file: src/platform/darwin/default_engine_deps.cpp
    rule: protocol_include_in_platform
    owner: platform-team
    reason: "Default Darwin engine dependency wiring constructs ProductionTransport with platform packet and TLS implementations."
    removal_phase: "Phase 9 -- introduce a platform-neutral production transport factory seam"

  - file: src/core/vpn/vpn_runtime.cpp
    rule: platform_ifdef_in_core
    owner: core-team
    reason: "Legacy runtime status snapshot still shells out to platform-specific interface probes until runtime status is fully owned by platform status providers."
    removal_phase: "Phase 9 -- move interface probing into platform status providers"

  - file: tests/native_packaging_policy_test.cpp
    rule: legacy_openconnect_token
    owner: native-engine-team
    reason: "Policy scanner test intentionally contains denied legacy runtime token fixtures to prove production package scans catch them."
    removal_phase: "After the policy scanner reads denied token fixtures from external test data instead of inline source text"

  - file: tests/native_only_cutover_contract_test.cpp
    rule: legacy_openconnect_token
    owner: native-engine-team
    reason: "Native-only contract test owns the denied token list and is the only active test source allowed to spell those removed identifiers."
    removal_phase: "After denied native-only tokens move into external test fixture data"

  - file: scripts/architecture-guardrails.ps1
    rule: legacy_openconnect_token
    owner: architecture-team
    reason: "PowerShell guardrail script owns the denied native-only token regex used to block removed identifiers elsewhere."
    removal_phase: "After guardrail rules move into external data files"

  - file: scripts/architecture-guardrails.sh
    rule: legacy_openconnect_token
    owner: architecture-team
    reason: "POSIX guardrail script owns the denied native-only token regex used to block removed identifiers elsewhere."
    removal_phase: "After guardrail rules move into external data files"

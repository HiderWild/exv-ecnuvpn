name: Build

on:
  push:
    branches: [main, feature/launchd-helper]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-13
            label: intel
          - os: macos-latest
            label: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j$(sysctl -n hw.ncpu)
      - name: Test
        run: |
          ./build/exv version
          ./build/exv help
          ./build/exv service status
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exv-macos-${{ matrix.label }}
          path: build/exv

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j$(nproc)
      - name: Test
        run: |
          ./build/exv version
          ./build/exv help
          ./build/exv service status
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exv-linux-amd64
          path: build/exv

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # OpenSSL is no longer required on Windows: crypto runs through
      # Windows CNG (bcrypt) at runtime and links to bcrypt.lib at build time.
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Build
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build --config Release
      - name: Test
        run: |
          .\build\Release\exv.exe version
          .\build\Release\exv.exe help
          .\build\Release\exv.exe service status
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exv-windows-amd64
          path: build/Release/exv.exe

  docker-build:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build multi-arch image
        run: docker buildx build --platform linux/amd64,linux/arm64 -t exv:ci .

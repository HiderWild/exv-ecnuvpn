name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: WebUI typecheck
        working-directory: webui
        run: npx tsc --noEmit
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Configure
        run: cmake --preset windows-release
      - name: Build
        run: cmake --build --preset windows-release
      - name: Architecture guardrails
        shell: pwsh
        run: scripts/architecture-guardrails.ps1
      - name: DLL dependency diagnostic
        if: always()
        shell: pwsh
        run: scripts/diagnose-mingw-dlls.ps1 -BuildDir build-windows/cpp
      - name: Test (release-blocking gate)
        run: ctest --preset windows-release --output-on-failure -L release-blocking
      - name: Test (env-sensitive, informational)
        if: always()
        continue-on-error: true
        run: ctest --preset windows-release --output-on-failure -L env-sensitive
      - name: Test (integration, informational)
        if: always()
        continue-on-error: true
        run: ctest --preset windows-release --output-on-failure -L integration
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs
          path: |
            build-windows/cpp/Testing/Temporary/LastTest.log
            build-windows/cpp/CMakeOutput.log
            build-windows/cpp/CMakeError.log

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: WebUI typecheck
        working-directory: webui
        run: npx tsc --noEmit
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Configure
        run: cmake --preset linux-release
      - name: Build
        run: cmake --build --preset linux-release
      - name: Architecture guardrails
        run: bash scripts/architecture-guardrails.sh
      - name: Test (release-blocking gate)
        run: ctest --preset linux-release --output-on-failure -L release-blocking
      - name: Test (env-sensitive, informational)
        if: always()
        continue-on-error: true
        run: ctest --preset linux-release --output-on-failure -L env-sensitive
      - name: Test (integration, informational)
        if: always()
        continue-on-error: true
        run: ctest --preset linux-release --output-on-failure -L integration
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-logs
          path: |
            build/linux/cpp/Testing/Temporary/LastTest.log
            build/linux/cpp/CMakeOutput.log
            build/linux/cpp/CMakeError.log

  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-13
            label: intel
          - os: macos-latest
            label: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: WebUI typecheck
        working-directory: webui
        run: npx tsc --noEmit
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Configure
        run: cmake --preset macos-release
      - name: Build
        run: cmake --build --preset macos-release
      - name: Architecture guardrails
        run: bash scripts/architecture-guardrails.sh
      - name: Test (release-blocking gate)
        run: ctest --preset macos-release --output-on-failure -L release-blocking
      - name: Test (env-sensitive, informational)
        if: always()
        continue-on-error: true
        run: ctest --preset macos-release --output-on-failure -L env-sensitive
      - name: Test (integration, informational)
        if: always()
        continue-on-error: true
        run: ctest --preset macos-release --output-on-failure -L integration
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-logs-${{ matrix.label }}
          path: |
            build/macos/cpp/Testing/Temporary/LastTest.log
            build/macos/cpp/CMakeOutput.log
            build/macos/cpp/CMakeError.log

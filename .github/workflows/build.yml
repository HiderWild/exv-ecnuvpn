name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Configure
        run: cmake --preset windows-release
      - name: Build
        run: cmake --build --preset windows-release
      - name: Test
        run: ctest --preset windows-release --output-on-failure
        continue-on-error: true
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs
          path: |
            build-windows/cpp/Testing/Temporary/LastTest.log
            build-windows/cpp/CMakeOutput.log
            build-windows/cpp/CMakeError.log

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libssl-dev
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Configure
        run: cmake --preset linux-release
      - name: Build
        run: cmake --build --preset linux-release
      - name: Test
        run: ctest --preset linux-release --output-on-failure
        continue-on-error: true
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-logs
          path: |
            build/linux/cpp/Testing/Temporary/LastTest.log
            build/linux/cpp/CMakeOutput.log
            build/linux/cpp/CMakeError.log

  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-13
            label: intel
          - os: macos-latest
            label: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install webui deps
        working-directory: webui
        run: npm install
      - name: Build webui
        working-directory: webui
        run: npm run build
      - name: Configure
        run: cmake --preset macos-release
      - name: Build
        run: cmake --build --preset macos-release
      - name: Test
        run: ctest --preset macos-release --output-on-failure
        continue-on-error: true
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-logs-${{ matrix.label }}
          path: |
            build/macos/cpp/Testing/Temporary/LastTest.log
            build/macos/cpp/CMakeOutput.log
            build/macos/cpp/CMakeError.log
